<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           padding: 24px; max-width: 500px; color: #1a1a1a; line-height: 1.5; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    h2 { font-size: 18px; font-weight: 600; }
    .disclaimer {
      background: #fffbf0; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 20px; font-size: 12px; color: #666; line-height: 1.5;
    }
    .disclaimer strong { color: #1a1a1a; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; }
    input {
      width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #e8e8e8;
      border-radius: 10px; font-size: 14px; transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #61BA1A; }
    .hint { font-size: 11px; color: #999; margin-top: 6px; }
    .btn-primary {
      margin-top: 20px; padding: 12px 28px; font-size: 14px; font-weight: 600;
      background: #61BA1A; color: white; border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #52a014; }
    .btn-primary:active { background: #478c12; transform: scale(0.99); }
    .status { margin-top: 12px; font-size: 13px; display: none; border-radius: 8px; padding: 10px 14px; }
    .status.ok { color: #2e7d32; background: #f0faf4; }
    .status.err { color: #d32f2f; background: #fef2f2; }
    .lang-toggle {
      font-size: 11px; font-weight: 600; cursor: pointer; color: #666;
      border: 1px solid #ddd; border-radius: 6px; padding: 4px 10px;
      background: #f5f5f5; transition: all 0.15s;
    }
    .lang-toggle:hover { background: #e8e8e8; color: #333; }
  </style>
</head>
<body>
  <div class='header'>
    <h2 id='t-title'>Hoymiles HiOne — Settings</h2>
    <button class='lang-toggle' id='lang-toggle' onclick='toggleLang()'>NL</button>
  </div>

  <div class='disclaimer' id='t-disclaimer'>
    Only change the API URL if Hoymiles migrates to a different endpoint.
    The default URL is <strong>https://neapi.hoymiles.com</strong>.
  </div>

  <label>Cloud API URL
    <input type='url' id='cloud_api_url' placeholder='https://neapi.hoymiles.com'>
  </label>
  <div class='hint' id='t-hint'>Base URL of the S-Miles Cloud API. Leave empty for the default URL.</div>

  <button class='btn-primary' id='save'>Save</button>
  <div class='status' id='status'></div>

  <script>
    var i18n = {
      nl: {
        title: 'Hoymiles HiOne — Instellingen',
        disclaimer: 'Wijzig de API URL alleen als Hoymiles naar een ander endpoint migreert. De standaard URL is <strong>https://neapi.hoymiles.com</strong>.',
        hint: 'Basis-URL van de S-Miles Cloud API. Laat leeg voor de standaard URL.',
        save: 'Opslaan',
        invalidUrl: 'Ongeldige URL. Gebruik het format https://...',
        saveFailed: 'Opslaan mislukt: ',
        saveOk: 'Opgeslagen! Bestaande apparaten gebruiken de nieuwe URL na herstart.'
      },
      en: {
        title: 'Hoymiles HiOne — Settings',
        disclaimer: 'Only change the API URL if Hoymiles migrates to a different endpoint. The default URL is <strong>https://neapi.hoymiles.com</strong>.',
        hint: 'Base URL of the S-Miles Cloud API. Leave empty for the default URL.',
        save: 'Save',
        invalidUrl: 'Invalid URL. Use the format https://...',
        saveFailed: 'Save failed: ',
        saveOk: 'Saved! Existing devices will use the new URL after restart.'
      }
    };

    var _lang = 'en';

    function applyLang(lang) {
      _lang = lang;
      var t = i18n[lang] || i18n.en;
      document.getElementById('t-title').textContent = t.title;
      document.getElementById('t-disclaimer').innerHTML = t.disclaimer;
      document.getElementById('t-hint').textContent = t.hint;
      document.getElementById('save').textContent = t.save;
      document.getElementById('lang-toggle').textContent = lang === 'nl' ? 'EN' : 'NL';
    }

    function toggleLang() {
      applyLang(_lang === 'nl' ? 'en' : 'nl');
    }

    function onHomeyReady(Homey) {
      Homey.getLanguage(function(err, lang) {
        if (!err && lang) applyLang(lang);
      });

      Homey.get('cloud_api_url', function(err, value) {
        if (!err && value) {
          document.getElementById('cloud_api_url').value = value;
        }
      });

      document.getElementById('save').addEventListener('click', function() {
        var url = document.getElementById('cloud_api_url').value.trim();
        var statusEl = document.getElementById('status');
        var t = i18n[_lang] || i18n.en;

        if (url.endsWith('/')) url = url.replace(/\/+$/, '');

        if (url && !/^https?:\/\/.+/.test(url)) {
          statusEl.textContent = t.invalidUrl;
          statusEl.className = 'status err';
          statusEl.style.display = 'block';
          return;
        }

        Homey.set('cloud_api_url', url || null, function(err) {
          if (err) {
            statusEl.textContent = t.saveFailed + err.message;
            statusEl.className = 'status err';
          } else {
            statusEl.textContent = t.saveOk;
            statusEl.className = 'status ok';
          }
          statusEl.style.display = 'block';
        });
      });

      Homey.ready();
    }
  </script>
</body>
</html>
