<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           padding: 20px; color: #1a1a1a; line-height: 1.5; }
    .header { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 12px; }
    .info-card {
      background: #f0f7ff; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 12px; font-size: 13px; color: #1a1a1a; line-height: 1.5;
    }
    .info-card a { color: #1565c0; font-weight: 500; text-decoration: none; }
    .info-card a:hover { text-decoration: underline; }
    .info-card strong { font-weight: 600; }
    .disclaimer-card {
      background: #fffbf0; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 18px; font-size: 12px; color: #666; line-height: 1.5;
    }
    .disclaimer-card strong { color: #1a1a1a; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-top: 14px; }
    input {
      width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #e8e8e8;
      border-radius: 10px; font-size: 15px; transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #61BA1A; }
    .btn-primary {
      margin-top: 22px; width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      background: #61BA1A; color: white; border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #52a014; }
    .btn-primary:active { background: #478c12; transform: scale(0.99); }
    .error {
      color: #d32f2f; background: #fef2f2; border-radius: 8px; padding: 10px 14px;
      margin-top: 10px; font-size: 13px; display: none;
    }
    .lang-toggle {
      font-size: 11px; font-weight: 600; cursor: pointer; color: #666;
      border: 1px solid #ddd; border-radius: 6px; padding: 4px 10px;
      background: #f5f5f5; transition: all 0.15s;
    }
    .lang-toggle:hover { background: #e8e8e8; color: #333; }
  </style>
</head>
<body>
  <div class='header'>
    <button class='lang-toggle' id='lang-toggle' onclick='toggleLang()'>NL</button>
  </div>
  <div class='info-card' id='t-account'>
    <strong>No account yet?</strong> Create an account via the S-Miles Home app:<br>
    <a href="https://apps.apple.com/no/app/s-miles-home/id6476897806" target="_blank">Apple App Store</a> |
    <a href="https://play.google.com/store/apps/details?id=com.hm.balcony&hl=en" target="_blank">Google Play Store</a>
  </div>
  <div class='disclaimer-card'>
    <span id='t-disc1'>Credentials are only sent to</span> <strong>hoymiles.com</strong>.<br>
    <span id='t-disc2'>This app is not affiliated with Hoymiles. Login is handled directly via the Hoymiles API and your credentials are not used for any other purpose.</span>
  </div>
  <label>
    <span id='t-email'>Email address</span>
    <input type='email' id='email' placeholder='you@example.com'>
  </label>
  <label>
    <span id='t-password'>Password</span>
    <input type='password' id='password'>
  </label>
  <div class='error' id='error'></div>
  <button class='btn-primary' id='t-login' onclick='proceed()'>Log in</button>
  <script>
    var i18n = {
      nl: {
        account: '<strong>Nog geen account?</strong> Maak een account aan via de S-Miles Home app:<br><a href="https://apps.apple.com/no/app/s-miles-home/id6476897806" target="_blank">Apple App Store</a> | <a href="https://play.google.com/store/apps/details?id=com.hm.balcony&hl=nl" target="_blank">Google Play Store</a>',
        disc1: 'Inloggegevens worden alleen verstuurd naar',
        disc2: 'Deze app is niet gelieerd aan Hoymiles. Inloggen gebeurt rechtstreeks via de Hoymiles API en je gegevens worden niet voor andere doeleinden gebruikt.',
        email: 'E-mailadres',
        emailPlaceholder: 'jij@voorbeeld.nl',
        password: 'Wachtwoord',
        login: 'Inloggen',
        errorEmpty: 'Vul beide velden in.',
        errorFailed: 'Login mislukt. Controleer je gegevens.'
      },
      en: {
        account: '<strong>No account yet?</strong> Create an account via the S-Miles Home app:<br><a href="https://apps.apple.com/no/app/s-miles-home/id6476897806" target="_blank">Apple App Store</a> | <a href="https://play.google.com/store/apps/details?id=com.hm.balcony&hl=en" target="_blank">Google Play Store</a>',
        disc1: 'Credentials are only sent to',
        disc2: 'This app is not affiliated with Hoymiles. Login is handled directly via the Hoymiles API and your credentials are not used for any other purpose.',
        email: 'Email address',
        emailPlaceholder: 'you@example.com',
        password: 'Password',
        login: 'Log in',
        errorEmpty: 'Please fill in both fields.',
        errorFailed: 'Login failed. Please check your credentials.'
      }
    };

    var _lang = 'en';

    function applyLang(lang) {
      _lang = lang;
      var t = i18n[lang] || i18n.en;
      document.getElementById('t-account').innerHTML = t.account;
      document.getElementById('t-disc1').textContent = t.disc1;
      document.getElementById('t-disc2').textContent = t.disc2;
      document.getElementById('t-email').textContent = t.email;
      document.getElementById('email').placeholder = t.emailPlaceholder;
      document.getElementById('t-password').textContent = t.password;
      document.getElementById('t-login').textContent = t.login;
      document.getElementById('lang-toggle').textContent = lang === 'nl' ? 'EN' : 'NL';
    }

    function toggleLang() {
      applyLang(_lang === 'nl' ? 'en' : 'nl');
    }

    Homey.getLanguage().then(function(lang) { applyLang(lang); }).catch(function() {});

    async function proceed() {
      var email = document.getElementById('email').value.trim();
      var pass  = document.getElementById('password').value;
      var errEl = document.getElementById('error');
      var t = i18n[_lang] || i18n.en;
      errEl.style.display = 'none';
      if (!email || !pass) { errEl.textContent = t.errorEmpty; errEl.style.display = 'block'; return; }
      var ok = await Homey.emit('login', { username: email, password: pass });
      if (ok) Homey.nextView();
      else { errEl.textContent = t.errorFailed; errEl.style.display = 'block'; }
    }
  </script>
</body>
</html>
